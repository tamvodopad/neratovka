services:
  neratovka:
    build: .
    image: neratovka-website:latest
    container_name: neratovka
    restart: unless-stopped
    networks:
      - nginx_proxy

# Routing is handled by Nginx Proxy Manager (jc21/nginx-proxy-manager)
# running on the same host. NPM is configured via its UI to forward
# `neratovka.ru` → http://neratovka:80 (the container resolves via
# Docker DNS within the shared `nginx_proxy` network).

networks:
  nginx_proxy:
    name: nginx_proxy
    external: true
