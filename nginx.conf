server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Memorial page is the canonical content for now.
    # Crawlers can index ww2.html directly; the root is left noindex.
}
